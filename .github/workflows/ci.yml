name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/gateway/**"
      - "src/cli/gateway-cli/**"
      - "src/config/**"
      - "scripts/**"
      - "test/**"
      - "vitest.gateway.config.ts"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/gateway/**"
      - "src/cli/gateway-cli/**"
      - "src/config/**"
      - "scripts/**"
      - "test/**"
      - "vitest.gateway.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check conflict markers
        run: pnpm check:no-conflict-markers

      - name: Check formatting
        run: pnpm format:check

      - name: Gateway tests
        run: pnpm test:gateway
